name: Publish Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.0.1)"
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Publish release artifacts
        run: >
          bash ./gradlew :common:publish :api:publish :api-paper:publish
          -Pversion=$VERSION
          --no-daemon
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Release reminder
        run: |
          echo "Release artifacts uploaded to the Maven Central staging repository."
          echo "Open https://central.sonatype.com/ → Deployments → Refresh → Publish for version $VERSION."
